name: Build

on:
  push:
    branches: [ main ]
  pull_requests:
    branches: [ main ]

jobs:
  build:
    runs-on: ubunut-latest

    steps:
      -name: checkout repository
      uses: actions/checkout@v4

      -name: install build tools
      run: sudo apt-get update && duso apt-get install -y build-essential

      -name: Build project
      run: make
